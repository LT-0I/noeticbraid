name: NoeticBraid CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install noeticbraid packages (editable + existing test extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/noeticbraid-core[test]"
          pip install -e "packages/noeticbraid-backend[dev]"

      - name: Run core pytest
        run: pytest packages/noeticbraid-core -v

      - name: Run backend pytest
        run: pytest packages/noeticbraid-backend -v

      - name: Run repository pytest gates
        run: pytest tests -v

      - name: Contract diff gate
        run: python scripts/contract_diff.py

      - name: Source-of-truth consistency gate
        run: python scripts/check_source_of_truth_consistency.py

      - name: Phase 1.1 contract freeze gate
        run: |
          grep -q 'contract_version: 1.0.0' docs/contracts/phase1_1_api_contract.md || (echo "phase1_1_api_contract.md contract_version not 1.0.0" && exit 1)
          grep -q 'authoritative: true' docs/contracts/phase1_1_api_contract.md || (echo "phase1_1_api_contract.md authoritative not true" && exit 1)
          grep -q 'frozen: true' docs/contracts/phase1_1_api_contract.md || (echo "phase1_1_api_contract.md frozen not true" && exit 1)

      - name: Phase 1.2 contract sidecar/runtime gate
        run: python scripts/check_phase1_2_contract_gate.py

      - name: Private leak scan (tracked files, redacted report)
        run: python scripts/private_leak_scan.py
