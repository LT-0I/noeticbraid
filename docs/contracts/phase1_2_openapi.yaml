openapi: 3.1.0
info:
  title: NoeticBraid Phase 1.2 API
  version: 1.2.0
  x-contract-version: 1.2.0
  x-status: AUTHORITATIVE
  x-frozen: true
  x-phase: "1.2"
  x-stage: "contract-1.2.0"
paths:
  /api/health:
    get:
      tags:
      - health
      summary: Health check
      description: Return the frozen v1.0.0 health response.
      operationId: health_api_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/auth/startup_token:
    post:
      tags:
      - auth
      summary: Validate startup token
      description: Stage 1 startup-token endpoint; no request body and always rejects.
      operationId: startup_token_api_auth_startup_token_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /api/dashboard/empty:
    get:
      tags:
      - dashboard
      summary: Empty dashboard state
      description: Return the frozen empty dashboard fixture.
      operationId: dashboard_empty_api_dashboard_empty_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyDashboard'
  /api/workspace/threads:
    get:
      tags:
      - workspace
      summary: List workspace threads
      description: Return an empty workspace thread fixture.
      operationId: workspace_threads_api_workspace_threads_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceThreads'
  /api/approval/queue:
    get:
      tags:
      - approval
      summary: List approval queue
      description: Return an empty approval queue fixture.
      operationId: approval_queue_api_approval_queue_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalQueue'
  /api/account/pool:
    get:
      tags:
      - account
      summary: Account pool draft state
      description: Return a v1.0.0 account-pool fixture without profile_records.
      operationId: account_pool_api_account_pool_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPoolDraft'
  /api/ledger/runs:
    get:
      tags:
      - ledger
      summary: List run records
      description: Return an empty run-ledger fixture.
      operationId: ledger_runs_api_ledger_runs_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunLedgerRuns'
  /api/ledger/runs/aggregate:
    get:
      operationId: aggregate_run_record_api_ledger_runs_aggregate_get
      tags:
        - ledger
      summary: Aggregate run record
      parameters:
        - name: run_id
          in: query
          required: true
          schema:
            type: string
            pattern: "^run_[A-Za-z0-9_]+$"
            maxLength: 128
      responses:
        '200':
          description: Aggregated run record view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunRecordAggregate'
components:
  schemas:
    AccountPoolDraft:
      properties:
        profiles:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Profiles
      additionalProperties: false
      type: object
      title: AccountPoolDraft
      description: Account pool fixture response; Stage 1 does not expose profile_records.
    ApprovalQueue:
      properties:
        approvals:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Approvals
      additionalProperties: false
      type: object
      title: ApprovalQueue
      description: Approval queue fixture response.
    AuthResponse:
      properties:
        accepted:
          type: boolean
          title: Accepted
        mode:
          type: string
          title: Mode
      additionalProperties: false
      type: object
      required:
      - accepted
      - mode
      title: AuthResponse
      description: Startup-token validation response.
    EmptyDashboard:
      properties:
        tasks:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Tasks
        approvals:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Approvals
        accounts:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Accounts
      additionalProperties: false
      type: object
      title: EmptyDashboard
      description: Empty dashboard fixture response.
    HealthResponse:
      properties:
        status:
          type: string
          title: Status
        contract_version:
          type: string
          title: Contract Version
        authoritative:
          type: boolean
          title: Authoritative
      additionalProperties: false
      type: object
      required:
      - status
      - contract_version
      - authoritative
      title: HealthResponse
      description: Health check response.
    RunLedgerRuns:
      properties:
        runs:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Runs
      additionalProperties: false
      type: object
      title: RunLedgerRuns
      description: Run ledger fixture response.
    WorkspaceThreads:
      properties:
        threads:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Threads
      additionalProperties: false
      type: object
      title: WorkspaceThreads
      description: Workspace thread fixture response.
    Task:
      type: object
      additionalProperties: false
      required:
      - task_id
      - task_type
      - risk_level
      - approval_level
      - user_request
      - source_channel
      properties:
        task_id:
          type: string
          minLength: 1
          maxLength: 128
          pattern: ^task_[A-Za-z0-9_]+$
          description: Stable task identifier prefixed with 'task_'.
        task_type:
          type: string
          enum:
          - project_planning
          - research
          - code_review
          description: Phase 1.1 supported task categories.
        risk_level:
          type: string
          enum:
          - low
          - medium
          - high
          description: Estimated risk level for routing and approval.
        approval_level:
          type: string
          enum:
          - none
          - light
          - strong
          - forbidden
          description: Required user approval level before execution.
        created_at:
          type: string
          format: date-time
          description: UTC-normalized task creation timestamp.
        status:
          type: string
          enum:
          - draft
          - ready
          - queued
          - running
          - waiting_for_user
          - failed
          - completed
          default: draft
          description: Current lifecycle status of the task.
        user_request:
          type: string
          minLength: 1
          maxLength: 8192
          description: Original user request text that initiated the task.
        source_channel:
          type: string
          enum:
          - console
          - obsidian
          - im
          - schedule
          - local
          description: Channel from which the request entered NoeticBraid.
        account_hint:
          type: string
          maxLength: 64
          nullable: true
          default: null
          description: Optional non-authoritative account routing hint; blank string normalizes to null.
        project_ref:
          type: string
          maxLength: 128
          nullable: true
          default: null
          description: Optional project or workspace reference; blank string normalizes to null.
    RunRecord:
      type: object
      additionalProperties: false
      required:
      - run_id
      - task_id
      - event_type
      - actor
      properties:
        run_id:
          type: string
          minLength: 1
          maxLength: 128
          pattern: ^run_[A-Za-z0-9_]+$
          description: Stable run identifier prefixed with 'run_'.
        task_id:
          type: string
          minLength: 1
          maxLength: 128
          pattern: ^task_[A-Za-z0-9_]+$
          description: Task identifier linked to this event.
        event_type:
          type: string
          enum:
          - task_created
          - task_classified
          - context_built
          - approval_requested
          - approval_decision_recorded
          - web_ai_call_requested
          - profile_health_checked
          - source_record_linked
          - artifact_created
          - security_violation
          - lesson_candidate_created
          - routing_advice_recorded
          - task_completed
          - task_failed
          description: Allowed Phase 1.1 run ledger event type.
        created_at:
          type: string
          format: date-time
          description: UTC-normalized run event timestamp.
        actor:
          type: string
          enum:
          - user
          - system
          - model
          - local_review
          description: Actor responsible for the event.
        model_refs:
          type: array
          maxItems: 100
          items:
            type: string
            pattern: ^model_[A-Za-z0-9_]+$
          default: []
          description: Model references involved in this run event; duplicates are rejected.
        source_refs:
          type: array
          maxItems: 100
          items:
            type: string
            pattern: ^source_[A-Za-z0-9_]+$
          default: []
          description: Source record references linked to this run event; duplicates are rejected.
        artifact_refs:
          type: array
          maxItems: 100
          items:
            type: string
            pattern: ^artifact_[A-Za-z0-9_]+$
          default: []
          description: Artifact references produced or used by this run event; duplicates are rejected.
        routing_advice:
          type: string
          maxLength: 4096
          nullable: true
          default: null
          description: Optional routing advice captured during orchestration; blank string normalizes to null.
        status:
          type: string
          enum:
          - draft
          - recorded
          - failed
          default: draft
          description: Persistence status for the ledger entry.
    SourceRecord:
      type: object
      additionalProperties: false
      required:
      - source_ref_id
      - source_type
      - title
      - retrieved_by_run_id
      - content_hash
      - source_fingerprint
      - evidence_role
      - used_for_purpose
      properties:
        source_ref_id:
          type: string
          minLength: 1
          maxLength: 128
          pattern: ^source_[A-Za-z0-9_]+$
          description: Stable source identifier prefixed with 'source_'.
        source_type:
          type: string
          enum:
          - user_note
          - web_page
          - github_repo
          - paper
          - patent
          - video
          - ai_output
          - paid_database
          description: Kind of source captured for grounding or memory.
        title:
          type: string
          minLength: 1
          maxLength: 512
          description: Source title.
        canonical_url:
          type: string
          maxLength: 2048
          nullable: true
          default: null
          description: Optional canonical HTTP(S) URL; if present, must start with http:// or https://; blank string normalizes to null.
        local_path:
          type: string
          maxLength: 1024
          nullable: true
          default: null
          description: Optional local path for local-only or mirrored source material; blank string normalizes to null.
        author:
          type: string
          maxLength: 256
          nullable: true
          default: null
          description: Optional author, organization, or account label; blank string normalizes to null.
        captured_at:
          type: string
          format: date-time
          description: UTC-normalized capture timestamp.
        retrieved_by_run_id:
          type: string
          minLength: 1
          maxLength: 128
          pattern: ^run_[A-Za-z0-9_]+$
          description: Run identifier that retrieved or linked this source.
        content_hash:
          type: string
          minLength: 71
          maxLength: 71
          pattern: ^sha256:[A-Fa-f0-9]{64}$
          description: sha256-prefixed content hash; implementation normalizes the hex portion to lowercase.
        source_fingerprint:
          type: string
          minLength: 1
          maxLength: 128
          pattern: ^fingerprint_[A-Za-z0-9_]+$
          description: Stable deduplication fingerprint prefixed with 'fingerprint_'.
        quality_score:
          type: string
          enum:
          - low
          - medium
          - high
          - unknown
          default: unknown
          description: Quality assessment for the source.
        relevance_score:
          type: string
          enum:
          - low
          - medium
          - high
          - unknown
          default: unknown
          description: Relevance assessment for the current task.
        evidence_role:
          type: string
          enum:
          - user_context
          - reference_project
          - source_grounding
          - contradiction
          - memory_update_evidence
          description: Role this source plays in evidence handling.
        used_for_purpose:
          type: string
          enum:
          - project_positioning
          - constraint_extraction
          - source_grounding
          - prior_art_check
          - other
          description: Purpose for which the source was used.
    ApprovalRequest:
      type: object
      additionalProperties: false
      required:
      - approval_id
      - task_id
      - approval_level
      - requested_action
      - reason
      properties:
        approval_id:
          type: string
          minLength: 1
          maxLength: 128
          pattern: ^approval_[A-Za-z0-9_]+$
          description: Stable approval identifier prefixed with 'approval_'.
        task_id:
          type: string
          minLength: 1
          maxLength: 128
          pattern: ^task_[A-Za-z0-9_]+$
          description: Task requesting approval.
        run_id:
          type: string
          maxLength: 128
          pattern: ^run_[A-Za-z0-9_]+$
          nullable: true
          default: null
          description: Optional run identifier that raised this request; blank string normalizes to null and null skips pattern validation.
        approval_level:
          type: string
          enum:
          - none
          - light
          - strong
          - forbidden
          description: Approval strength needed for the requested action.
        requested_at:
          type: string
          format: date-time
          description: UTC-normalized approval request timestamp.
        requested_action:
          type: string
          minLength: 1
          maxLength: 2048
          description: Action that requires approval.
        reason:
          type: string
          minLength: 1
          maxLength: 4096
          description: Reason the action requires approval or is blocked.
        diff_ref:
          type: string
          maxLength: 256
          nullable: true
          default: null
          description: Optional diff or artifact reference for user review; blank string normalizes to null.
        status:
          type: string
          enum:
          - pending
          - approved
          - rejected
          - blocked
          default: pending
          description: Current approval decision status.
    SideNote:
      type: object
      additionalProperties: false
      required:
      - note_id
      - note_type
      - claim
      - confidence
      properties:
        note_id:
          type: string
          minLength: 1
          maxLength: 128
          pattern: ^note_[A-Za-z0-9_]+$
          description: Stable note identifier prefixed with 'note_'.
        created_at:
          type: string
          format: date-time
          description: UTC-normalized note creation timestamp.
        linked_source_refs:
          type: array
          maxItems: 100
          items:
            type: string
            pattern: ^source_[A-Za-z0-9_]+$
          default: []
          description: Source references supporting or challenging the note; duplicates are rejected.
        note_type:
          type: string
          enum:
          - fact
          - hypothesis
          - challenge
          - action
          description: Type of side note.
        claim:
          type: string
          minLength: 1
          maxLength: 4096
          description: Claim or action text.
        confidence:
          type: string
          enum:
          - low
          - medium
          - high
          description: Confidence in the claim.
        user_response:
          type: string
          enum:
          - unread
          - accepted
          - rejected
          - modified
          default: unread
          description: User handling state for the note.
        follow_up_ref:
          type: string
          maxLength: 128
          nullable: true
          default: null
          description: Optional follow-up task, approval, note, or digestion reference; blank string normalizes to null.
    DigestionItem:
      type: object
      additionalProperties: false
      required:
      - digestion_id
      - side_note_id
      properties:
        digestion_id:
          type: string
          minLength: 1
          maxLength: 128
          pattern: ^digestion_[A-Za-z0-9_]+$
          description: Stable digestion identifier prefixed with 'digestion_'.
        side_note_id:
          type: string
          minLength: 1
          maxLength: 128
          pattern: ^note_[A-Za-z0-9_]+$
          description: Side note from which this digestion item was created.
        created_at:
          type: string
          format: date-time
          description: UTC-normalized digestion item creation timestamp.
        c_status:
          type: string
          enum:
          - c0
          - c1
          - c2
          - c3
          - c4
          - cX
          default: c0
          description: Review cadence state.
        user_response_ref:
          type: string
          maxLength: 128
          nullable: true
          default: null
          description: Optional reference to the user response that updated this item; blank string normalizes to null.
        next_review_at:
          type: string
          format: date-time
          nullable: true
          default: null
          description: Optional next review timestamp normalized to UTC.
        status:
          type: string
          enum:
          - open
          - closed
          - rejected
          - snoozed
          default: open
          description: Current digestion workflow status.
    Workflow:
      type: object
      additionalProperties: false
      required:
        - workflow_id
        - workflow_type
        - title
        - steps
        - status
      properties:
        workflow_id:
          type: string
          pattern: "^workflow_[A-Za-z0-9_]+$"
          maxLength: 128
          description: Stable identifier for this workflow definition.
        workflow_type:
          type: string
          enum:
            - information_radar
            - idea_to_project
            - literature_review
            - code_generation_review
            - weekly_reflection
            - custom
          description: One of the workflow categories defined by Blueprint section 16.
        title:
          type: string
          minLength: 1
          maxLength: 256
          description: Human-readable workflow name.
        description:
          type: string
          maxLength: 4096
          description: Optional workflow description.
        steps:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: object
            additionalProperties: false
            required:
              - step_id
              - step_order
              - role
            properties:
              step_id:
                type: string
                pattern: "^step_[A-Za-z0-9_]+$"
                maxLength: 64
                description: Stable identifier within the workflow.
              step_order:
                type: integer
                minimum: 1
                maximum: 50
                description: 1-based ordering key within the workflow.
              role:
                type: string
                enum:
                  - orchestrator
                  - planner
                  - researcher
                  - producer
                  - writer
                  - coder
                  - reviewer
                  - adversary
                  - source_auditor
                  - verifier
                  - convergence_editor
                  - human_decision
                description: Role responsible for this step.
              capability:
                type: string
                enum:
                  - planning
                  - research
                  - writing
                  - coding
                  - code_review
                  - adversary
                  - source_audit
                  - browser
                  - file_io
                  - verification
                  - security_review
                  - convergence
                  - human_review
                description: Optional capability expected from the step.
              input_kind:
                type: string
                enum:
                  - task_card
                  - source_record
                  - run_record
                  - artifact
                  - prior_step_output
                  - user_input
                description: Optional primary input kind.
              output_kind:
                type: string
                enum:
                  - artifact
                  - run_record
                  - approval_request
                  - side_note
                  - digestion_item
                  - convergence_decision
                description: Optional primary output kind.
              gate_policy:
                type: string
                enum:
                  - none
                  - dual_review
                  - multi_review
                  - human_required
                default: none
                description: Gate behavior for this workflow step.
        related_routes:
          type: array
          maxItems: 32
          items:
            type: string
            pattern: "^route_[A-Za-z0-9_]+$"
          description: Optional ModelRoute references related to this workflow.
        related_runs:
          type: array
          maxItems: 100
          items:
            type: string
            pattern: "^run_[A-Za-z0-9_]+$"
          description: Optional RunRecord run references related to this workflow.
        status:
          type: string
          enum:
            - draft
            - active
            - deprecated
            - candidate
          description: Workflow lifecycle status.
    ModelRoute:
      type: object
      additionalProperties: false
      required:
        - route_id
        - task_id
        - route_type
        - trigger
        - risk_level
        - required_capabilities
        - selected_models
        - rejected_models
        - run_refs
        - artifact_refs
        - source_refs
        - status
        - rationale
      properties:
        route_id:
          type: string
          pattern: "^route_[A-Za-z0-9_]+$"
          maxLength: 128
        task_id:
          type: string
          pattern: "^task_[A-Za-z0-9_]+$"
          maxLength: 128
        workflow_id:
          type: string
          pattern: "^workflow_[A-Za-z0-9_]+$"
          maxLength: 128
          nullable: true
          default: null
          description: Optional link to a Workflow; null or absent for ad-hoc routes.
        route_type:
          type: string
          enum:
            - single_model
            - producer_reviewer
            - dual_review
            - multi_review
            - manual_convergence
        trigger:
          type: string
          enum:
            - user_request
            - task_card
            - workflow_step
            - review_gate
            - failure_recovery
        risk_level:
          type: string
          enum:
            - low
            - medium
            - high
            - disputed
        required_capabilities:
          type: array
          minItems: 1
          maxItems: 32
          items:
            type: string
            enum:
              - planning
              - research
              - writing
              - coding
              - code_review
              - adversary
              - source_audit
              - browser
              - file_io
              - verification
              - security_review
              - convergence
        selected_models:
          type: array
          minItems: 1
          maxItems: 16
          items:
            type: object
            additionalProperties: false
            required:
              - model_ref
              - role
              - invocation
              - reason
            properties:
              model_ref:
                type: string
                pattern: "^model_[A-Za-z0-9_]+$"
                maxLength: 128
              role:
                type: string
                enum:
                  - orchestrator
                  - planner
                  - researcher
                  - producer
                  - writer
                  - coder
                  - reviewer
                  - adversary
                  - source_auditor
                  - verifier
                  - convergence_editor
                  - human_decision
              invocation:
                type: string
                enum:
                  - local_session
                  - codex_cli
                  - chatgpt_web
                  - subagent
                  - manual
              reason:
                type: string
                minLength: 1
                maxLength: 2048
        rejected_models:
          type: array
          maxItems: 32
          items:
            type: object
            additionalProperties: false
            required:
              - model_ref
              - reason
            properties:
              model_ref:
                type: string
                pattern: "^model_[A-Za-z0-9_]+$"
                maxLength: 128
              reason:
                type: string
                minLength: 1
                maxLength: 2048
        run_refs:
          type: array
          maxItems: 100
          items:
            type: string
            pattern: "^run_[A-Za-z0-9_]+$"
            maxLength: 128
        artifact_refs:
          type: array
          maxItems: 100
          items:
            type: string
            pattern: "^artifact_[A-Za-z0-9_]+$"
            maxLength: 128
        source_refs:
          type: array
          maxItems: 100
          items:
            type: string
            pattern: "^source_[A-Za-z0-9_]+$"
            maxLength: 128
        status:
          type: string
          enum:
            - draft
            - selected
            - invoked
            - superseded
            - failed
        rationale:
          type: string
          minLength: 1
          maxLength: 4096
      description: "OpenAPI component embedded for contract 1.2.0; source: tools/multimodel_alliance/schemas/model_route.schema.json"
    VaultLayoutMinimum:
      type: object
      additionalProperties: false
      required:
        - layout_id
        - namespace_default
        - root_dirs
        - path_policy
        - max_depth
        - traversal_check
      properties:
        layout_id:
          type: string
          pattern: "^layout_[A-Za-z0-9_]+$"
          maxLength: 128
        namespace_default:
          type: string
          pattern: ^[A-Za-z][A-Za-z0-9_]*/$
          description: Default namespace prefix; canonical NoeticBraid value is 'NoeticBraid/'.
        root_dirs:
          type: array
          minItems: 8
          maxItems: 8
          items:
            type: object
            additionalProperties: false
            required:
              - path
              - role
            properties:
              path:
                type: string
                pattern: ^[0-9]{2}_[a-z_]+/$
              role:
                type: string
                enum:
                  - dashboard_workbench
                  - program_memory
                  - episodic_memory
                  - run_ledger_mirror
                  - templates
                  - bases
                  - inbox
                  - system_metadata
        path_policy:
          type: object
          additionalProperties: false
          required:
            - allow_write_kinds
            - deny_write_kinds
          properties:
            allow_write_kinds:
              type: array
              items:
                type: string
                enum:
                  - generated_dashboard
                  - stable_record_create_only
                  - inbox_staging
                  - candidate_proposal
                  - sync_log_append_only
            deny_write_kinds:
              type: array
              items:
                type: string
                enum:
                  - protected_user_raw
                  - plugin_or_config
                  - git_metadata
                  - outside_namespace
                  - path_traversal
        max_depth:
          type: integer
          minimum: 4
          maximum: 12
          default: 8
        traversal_check:
          type: string
          enum:
            - strict_no_parent
          description: Fail-closed; only strict_no_parent is permitted per step 2 arbitration.
        test_cases_ref:
          type: string
          const: noeticbraid/docs/contracts/fixtures/path_policy_cases.json
    RunRecordAggregate:
      type: object
      additionalProperties: false
      required:
        - run_id
        - task_id
        - event_count
      properties:
        run_id:
          type: string
          pattern: "^run_[A-Za-z0-9_]+$"
          maxLength: 128
          description: Run identifier requested by the aggregate endpoint.
        task_id:
          type: string
          pattern: "^task_[A-Za-z0-9_]+$"
          maxLength: 128
          nullable: true
          description: Task identifier linked to the aggregate; nullable for empty streams.
        event_count:
          type: integer
          minimum: 0
          description: Computed count of RunRecord events in the aggregate input.
        first_event_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the first RunRecord event in the aggregate input.
        last_event_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the last RunRecord event in the aggregate input.
        models_used:
          type: array
          nullable: true
          description: Union (dedup) of all model_refs across the run's events.
          items:
            type: string
            pattern: "^model_[A-Za-z0-9_]+$"
            maxLength: 128
        artifacts:
          type: array
          nullable: true
          description: Artifact references collected from artifact_created events.
          items:
            type: object
            additionalProperties: false
            required:
              - event_id
              - artifact_ref
            properties:
              event_id:
                type: string
              artifact_ref:
                type: string
        errors:
          type: array
          nullable: true
          description: Failure entries from task_failed and security_violation events; text fields follow nested NO-LEAK rules.
          items:
            type: object
            additionalProperties: false
            required:
              - event_id
            properties:
              event_id:
                type: string
              error_kind:
                type: string
                description: Best-effort classifier; unknown is allowed when the event payload lacks a kind.
              message:
                type: string
                description: "NO-LEAK: Derived only from RunRecord event payload and artifact_refs join; never from stdout, exception repr, environment, browser paths, or credential material."
        lessons_summary:
          type: array
          nullable: true
          description: Lesson entries from lesson_candidate_created events; text fields follow nested NO-LEAK rules.
          items:
            type: object
            additionalProperties: false
            required:
              - event_id
            properties:
              event_id:
                type: string
              lesson_candidate_text:
                type: string
                description: "NO-LEAK: Derived only from RunRecord event payload and artifact_refs join; never from stdout, exception repr, environment, browser paths, or credential material."
