[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "noeticbraid-notebooklm-rpc"
version = "0.1.0"
description = "NoeticBraid wrapper for notebooklm-py with multi-account pool"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{name = "NoeticBraid Contributors"}]
keywords = ["noeticbraid", "notebooklm", "multi-account-pool"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
  "notebooklm-py==0.4.1",
  "jsonschema>=4.0,<5.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["noeticbraid*"]

[tool.setuptools.package-data]
"noeticbraid.tools.notebooklm_rpc" = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
pythonpath = ["src"]
asyncio_mode = "auto"
