[project]
name = "noeticbraid-backend"
version = "0.1.0a1"
description = "NoeticBraid backend service (Phase 1.2 skeleton)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "NoeticBraid Team" }]
dependencies = [
    "fastapi>=0.104.0",
    "pydantic>=2.5",
    "noeticbraid-core>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "httpx>=0.24",
    "uvicorn>=0.24",
]

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[tool.pdm.dev-dependencies]
test = ["pytest-cov"]
