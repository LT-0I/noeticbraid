[project]
name = "noeticbraid-runtime"
version = "1.0.0"
description = "Browser & CLI Runtime primitives for NoeticBraid (SP-C2)."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = []

[project.optional-dependencies]
browser = ["playwright>=1.44", "websocket-client>=1.6"]
test = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/noeticbraid_runtime"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
