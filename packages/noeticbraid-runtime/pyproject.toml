[project]
name = "noeticbraid-runtime"
version = "0.1.0-stage0"
description = "Host runtime interfaces, local server boundary, workers, profiles, and IM adapters."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/noeticbraid_runtime"]
