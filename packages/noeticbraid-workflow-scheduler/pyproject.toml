[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "noeticbraid-workflow-scheduler"
version = "0.2.0"
description = "NoeticBraid SP-E Workflow Scheduler: card schedule + step execution + run ledger + outbound notifier with frozen Workflow 1.2.0 / Task / RunRecord enums."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{name = "NoeticBraid Contributors"}]
keywords = ["noeticbraid", "workflow", "scheduler", "ledger", "notifier"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8,<9"]

[project.scripts]
workflow-scheduler = "noeticbraid.tools.workflow_scheduler.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["noeticbraid*"]

[tool.setuptools.package-data]
"noeticbraid.tools.workflow_scheduler" = ["schemas/*.json", "fixtures/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
pythonpath = ["src"]
