[project]
name = "noeticbraid-core"
version = "1.0.0+stage0"
description = "Core contracts, guards, ledger vocabulary, schemas, and orchestration interfaces."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }

dependencies = [
    "pydantic>=2.6,<3.0",
    "portalocker>=2.0,<3",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "jsonschema>=4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/noeticbraid_core"]
